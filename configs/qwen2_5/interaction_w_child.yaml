experiment:
  name: interaction_w_child_ovis2
  seed: 42

model:
  name: ovis2
  device: cuda
  precision: bf16
  max_frames: 16

output:
  save_dir: /orcd/scratch/bcs/001/sensein/sails/pred2annot_evaluation/interaction_w_child/qwen25
  save_predictions: true

data:
  video_path_column: BidsProcessed
  ground_truth_csv: /orcd/scratch/bcs/001/sensein/sails/BIDS_data/anotated_processed.csv
  label_column: Interaction_with_child

task:
  type: classification
  labels:
  - yes
  - no


prompt:
  message: |
    You are a cautious video understanding model.

    Task: Decide if there is ANY visible evidence in the provided frames of a social interaction OR an attempted interaction directed toward the target child.

    Count as "yes" if you see at least one of these child-directed cues (even subtle/brief):
    - An adult/other person looks toward the child and appears to speak (mouth open, face oriented to child).
    - Calling/gesturing to the child (waving, beckoning, pointing at/near the child, reaching toward the child).
    - Offering/showing/giving/taking an object with the child (shared attention to the same object).
    - Touching/assisting the child (guiding hands, adjusting clothing, helping them move).
    - Filmer clearly trying to get the child’s attention (camera moves in a “look at you” way + adult posture/gesture toward child).
    - Child responds to someone (turns head, smiles, hands something over) AND another person is visibly present/engaged.

    Count as "no" ONLY if none of the above cues are visible in the provided frames.

    IMPORTANT:
    - Do NOT assume audio or events outside the frames.
    - If there is weak but real visual evidence of child-directed engagement, choose "yes".
    - If the frames are truly insufficient and show no interaction cues, choose "no".

    Possible labels: [yes, no].
    Answer with only the label.

evaluation:
  metrics:
  - accuracy
