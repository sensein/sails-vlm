experiment:
  name: num_background_ovis2
  seed: 42
  description: >
    Counting task: count the total number of people (adults and children)
    present in the background of the video.

model:
  name: ovis2
  device: cuda
  precision: bf16
  max_frames: 16

output:
  save_dir: /orcd/scratch/bcs/001/sensein/sails/pre2annot_evaluation/num_background_ovis2
  save_predictions: true

data:
  video_path_column: BidsProcessed
  ground_truth_csv: /orcd/scratch/bcs/001/sensein/sails/BIDS_data/anotated_processed.csv
  label_column: "#_people_background"
  drop_missing_labels: true

task:
  type: counting

prompt:
  message: |
    You are a video understanding model.
    Given the following video, count the total number of people (adults and children)
    present in the background of the video.

    Background people should:
    - Appear smaller and not be a focal point of the video
    - Not be engaged in the main activity
    - May go in and out of frame
    - At least half of their bodies should be visible to count

    Example: If the video is at a park and there are children playing on equipment
    in the distance (not alongside the target child), count them.
    If the child is the only visible person, answer "0".

    Answer with only a single number (e.g., 0, 1, 2, 3, etc.).

evaluation:
  metrics:
  - mae
  - rmse
  - exact_match
  - off_by_one

