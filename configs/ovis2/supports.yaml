experiment:
  name: supports_ovis2
  seed: 42
  description: >
    Classification task: indicate whether there is a verbal/physical interaction
    that assists the child in some way.

model:
  name: ovis2
  device: cuda
  precision: bf16
  max_frames: 16

output:
  save_dir: /orcd/scratch/bcs/001/sensein/sails/pre2annot_evaluation/supports_ovis2
  save_predictions: true

data:
  video_path_column: BidsProcessed
  ground_truth_csv: /orcd/scratch/bcs/001/sensein/sails/BIDS_data/anotated_processed.csv
  label_column: Supports
  drop_missing_labels: true

task:
  type: classification
  labels:
  - "yes"
  - "no"

prompt:
  message: |
    You are a video understanding model.
    Given the following video, indicate if there is a verbal/physical interaction
    that assists the child in some way.

    Rate "yes" if there is an assistive interaction (e.g., adult asks child questions,
    gives directions, models language, provides prompts, or physically helps the child).
    Rate "no" if there is no interaction, or if there is interaction but it is not assistive.

    Possible labels are: [yes, no].
    Answer with only the label.

evaluation:
  metrics:
  - accuracy


