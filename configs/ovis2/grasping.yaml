experiment:
  name: grasping_ovis2
  seed: 42
  description: >
    Classification task: indicate whether the child holds an object or objects
    in their hand(s).

model:
  name: ovis2
  device: cuda
  precision: bf16
  max_frames: 16

output:
  save_dir: /orcd/scratch/bcs/001/sensein/sails/pre2annot_evaluation/grasping_ovis2
  save_predictions: true

data:
  video_path_column: BidsProcessed
  ground_truth_csv: /orcd/scratch/bcs/001/sensein/sails/BIDS_data/anotated_processed.csv
  label_column: Grasping
  drop_missing_labels: true

task:
  type: classification
  labels:
  - "yes"
  - "no"

prompt:
  message: |
    You are a video understanding model.
    Given the following video, indicate whether the child holds an object or objects
    in their hand(s).

    Rate "yes" if the child is holding an object (e.g., child is holding a toy or
    self-feeding).
    Rate "no" if the child's hands are empty for the duration of the video.

    Important: Do not rate "yes" if the child is only grasping furniture.

    Possible labels are: [yes, no].
    Answer with only the label.

evaluation:
  metrics:
  - accuracy

