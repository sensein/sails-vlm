experiment:
  name: num_children_ovis2
  seed: 42
  description: >
    Counting task: count the total number of children (infants/children/adolescents)
    present in the foreground of the video.

model:
  name: ovis2
  device: cuda
  precision: bf16
  max_frames: 16

output:
  save_dir: /orcd/scratch/bcs/001/sensein/sails/pre2annot_evaluation/num_children_ovis2
  save_predictions: true

data:
  video_path_column: BidsProcessed
  ground_truth_csv: /orcd/scratch/bcs/001/sensein/sails/BIDS_data/anotated_processed.csv
  label_column: "#_children"
  drop_missing_labels: true

task:
  type: counting

prompt:
  message: |
    You are a video understanding model.
    Given the following video, count the total number of children
    (appearing to be infants, children, or adolescents) present in the
    foreground of the video.

    The children should appear larger and be a focal point of the video.
    This count should always be at least 1 (the target child).

    Example: If the video is at a park and there are other children playing
    alongside the target child, count all visible children.

    Answer with only a single number (e.g., 1, 2, 3, etc.).

evaluation:
  metrics:
  - mae
  - rmse
  - exact_match
  - off_by_one

