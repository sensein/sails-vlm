experiment:
  name: gesture_type_ovis2
  seed: 42

model:
  name: ovis2
  device: cuda
  precision: bf16
  max_frames: 16

output:
  save_dir: /orcd/scratch/bcs/001/sensein/sails/pred2annot_evaluation/gesture_type/ovis2
  save_predictions: true

data:
  video_path_column: BidsProcessed
  ground_truth_csv: /orcd/scratch/bcs/001/sensein/sails/BIDS_data/anotated_processed.csv
  label_column: Gesture_type

task:
  type: classification
  labels:
  - reach
  - show
  - give
  - point
  - take
  - head shake
  - head nod
  - wave
  - clap
  - sign
  - multiple
  - NaN

prompt:
  message: |
    Task: Identify the single best label for the child’s non-verbal communication gesture in the video.
    Choose EXACTLY ONE label from this fixed set:
    [reach, show, point, take, head_shake, head_nod, wave, clap, sign, multiple, na]

    Definitions:
    - reach: Child extends one or both arms toward an object/person/location (not holding an object outward).
    - show: Child holds object(s) and extends arm(s) outward toward another person (presenting/displaying).
    - point: Child isolates finger(s) directed toward an object/person/location (may touch or not).
    - take: Child accepts/grabs object(s) from another person.
    - head_shake: Head moves side-to-side (≥1 full shake: left and right).
    - head_nod: Head moves up-and-down (≥1 full nod: down and up).
    - wave: One hand moves repeatedly (horizontal or vertical) directed at person/camera.
    - clap: Hands come together so palms touch (once or repeatedly).
    - sign: American Sign Language or a clear approximation used to communicate.
    - multiple: Two or more of the above gestures clearly occur at different times in the clip.
    - na: None of the above is clearly observed OR the relevant body parts are not visible enough to tell.

    Decision rules:
    1) If finger(s) are clearly isolated, choose point over reach.
    2) If the child is holding object(s) outward toward someone, choose show (not reach).
    3) If the child is receiving/grabbing object(s) from another person, choose take.
    4) If ≥2 distinct gestures occur clearly at different times, choose multiple.
    5) If occluded/blurry/too brief to be confident, choose na.
    6) Do not guess intentions or off-screen actions; use only what is visible.

    Output:
    Output exactly one label from the fixed set and nothing else.

evaluation:
  metrics:
  - accuracy
  - top2_accuracy
